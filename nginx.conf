# ════════════════════════════════════════════════════════
#  NGINX — iCal Production Configuration
#  Place at: /etc/nginx/sites-available/ical
#  Enable:   sudo ln -s /etc/nginx/sites-available/ical /etc/nginx/sites-enabled/
# ════════════════════════════════════════════════════════

# Upstream Gunicorn workers
upstream ical_app {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (uncomment after adding SSL) ──
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────
server {
    listen 80;
    # listen 443 ssl;  # uncomment for SSL
    server_name 16.171.26.107;

    # ── SSL (uncomment after certbot) ────────────────
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;

    # ── Logging ───────────────────────────────────────
    access_log /var/log/nginx/ical_access.log;
    error_log  /var/log/nginx/ical_error.log;

    # ── Security headers ──────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── Client / upload limits ────────────────────────
    client_max_body_size 12M;
    client_body_timeout  60s;

    # ── Static assets — served directly by NGINX ─────
    location /static/ {
        alias /home/ubuntu/ical/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── PWA files ─────────────────────────────────────
    location = /manifest.json {
        alias /home/ubuntu/ical/app/static/manifest.json;
        add_header Content-Type application/manifest+json;
        expires 7d;
    }

    location = /sw.js {
        alias /home/ubuntu/ical/app/static/sw.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location = /favicon.ico {
        alias /home/ubuntu/ical/app/static/icons/icon-192.png;
        expires 30d;
        access_log off;
    }

    # ── API — proxy to Gunicorn ───────────────────────
    location /api/ {
        proxy_pass         http://ical_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Allow large file uploads (food photos)
        proxy_request_buffering off;
    }

    # ── All other routes → Flask (renders HTML templates) ──
    location / {
        proxy_pass         http://ical_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    # ── Health check (no auth, no logs) ──────────────
    location = /api/health {
        proxy_pass http://ical_app;
        access_log off;
    }
}
