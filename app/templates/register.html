{% extends "base.html" %}
{% block title %}Create Account — iCal{% endblock %}

{% block body %}
<div class="auth-page">

  <a href="/" class="auth-back fade-up">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>

  <div class="auth-logo fade-up d1">iCal</div>
  <h2 style="font-family:var(--ff-d);font-size:24px;font-weight:800;letter-spacing:-.03em;margin-bottom:5px" class="fade-up d1">Create account</h2>
  <p style="font-size:14px;color:var(--t2);margin-bottom:24px" class="fade-up d1">Start tracking your nutrition today</p>

  <div class="card fade-up d2" style="padding:22px">
    <div class="err-box" id="err-box"></div>
    <form id="form" style="display:flex;flex-direction:column;gap:15px" novalidate>

      <div class="fg">
        <label class="fl" for="email">Email</label>
        <input id="email" type="email" class="fc" placeholder="you@example.com" autocomplete="email" inputmode="email"/>
        <span id="email-err" class="fe hidden"></span>
      </div>

      <div class="fg">
        <label class="fl" for="password">Password</label>
        <div class="pw-wrap">
          <input id="password" type="password" class="fc" placeholder="Min. 6 characters" autocomplete="new-password"/>
          <button type="button" class="pw-eye" id="eye" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="str-track"><div class="str-bar" id="str-bar"></div></div>
        <span id="pw-err" class="fe hidden"></span>
      </div>

      <div class="fg">
        <label class="fl" for="calgoal">Daily Calorie Goal</label>
        <input id="calgoal" type="number" class="fc" placeholder="e.g. 2000" min="500" max="5000" value="2000" inputmode="numeric"/>
      </div>

      <div class="fg">
        <label class="fl" for="weight">Weight — kg <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">(optional)</span></label>
        <input id="weight" type="number" class="fc" placeholder="e.g. 70" min="20" max="400" step="0.1" inputmode="decimal"/>
      </div>

      <div class="fg">
        <label class="fl">Goal <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">(optional)</span></label>
        <div class="goal-grid">
          <div><input type="radio" name="goal" value="lose"     id="g-l" class="goal-radio"/><label for="g-l" class="goal-lbl">Lose weight</label></div>
          <div><input type="radio" name="goal" value="maintain" id="g-m" class="goal-radio"/><label for="g-m" class="goal-lbl">Maintain</label></div>
          <div><input type="radio" name="goal" value="gain"     id="g-g" class="goal-radio"/><label for="g-g" class="goal-lbl">Gain muscle</label></div>
        </div>
      </div>

      <button type="submit" id="btn" class="btn btn-amber btn-full btn-lg">
        <div class="sp"></div><span class="bt">Create Account</span>
      </button>
    </form>
    <div class="divider" style="margin:18px 0">already have an account?</div>
    <p style="text-align:center;font-size:14px;color:var(--t2)">
      <a href="/login" style="color:var(--amber);font-weight:600">Sign in</a>
    </p>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
if (localStorage.getItem('token')) window.location.href = '/dashboard';

const strColors = ['','#ef4444','#f97316','#eab308','#22c55e','#f59e0b'];
document.getElementById('password').addEventListener('input', function() {
  const s   = pwStrength(this.value);
  const bar = document.getElementById('str-bar');
  bar.style.width      = (s * 20) + '%';
  bar.style.background = strColors[s] || 'transparent';
});
document.getElementById('eye').addEventListener('click', function() {
  const pw = document.getElementById('password');
  pw.type  = pw.type === 'text' ? 'password' : 'text';
});

const errBox = document.getElementById('err-box');
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  errBox.style.display = 'none';
  const emailEl = document.getElementById('email');
  const pwEl    = document.getElementById('password');
  const ok1 = markField(emailEl, 'email-err', validateEmail(emailEl.value), 'Enter a valid email');
  const ok2 = markField(pwEl,    'pw-err',    pwEl.value.length >= 6,        'Minimum 6 characters');
  if (!ok1 || !ok2) return;
  const goal    = document.querySelector('input[name="goal"]:checked')?.value ?? null;
  const weight  = document.getElementById('weight').value;
  const calgoal = parseInt(document.getElementById('calgoal').value) || 2000;
  const btn     = document.getElementById('btn');
  setLoading(btn, true);
  try {
    const body = { email: emailEl.value.trim(), password: pwEl.value, calorie_goal: calgoal };
    if (weight) body.weight = parseFloat(weight);
    if (goal)   body.goal   = goal;
    const data = await api('/api/register', 'POST', body);
    localStorage.setItem('token',        data.token);
    localStorage.setItem('user_email',   data.email);
    localStorage.setItem('user_id',      data.user_id);
    localStorage.setItem('username',     data.username || data.email.split('@')[0]);
    localStorage.setItem('calorie_goal', data.calorie_goal || 2000);
    window.location.href = '/dashboard';
  } catch (err) {
    errBox.textContent   = err.message;
    errBox.style.display = 'block';
    setLoading(btn, false);
  }
});
</script>
{% endblock %}
