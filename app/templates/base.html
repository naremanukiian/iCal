<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="iCal"/>
<title>{% block title %}iCal{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/style.css?v=17"/>
<link rel="stylesheet" href="/static/css/frame.css?v=17"/>
{% block head %}{% endblock %}
</head>
<body class="frame-body">
<div class="phone-frame-wrap">
  <div class="phone-frame">
    <div class="btn-mute"></div><div class="btn-vol-up"></div>
    <div class="btn-vol-dn"></div><div class="btn-power"></div>
    <div class="screen-glass">
      <div class="dynamic-island">
        <div class="di-sensor"></div><div class="di-lens"></div>
      </div>
      <div id="phone-screen">
        <div id="toast"></div>
        <svg width="0" height="0" style="position:absolute;pointer-events:none">
          <defs>
            <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#34D399"/>
              <stop offset="100%" style="stop-color:#059669"/>
            </linearGradient>
          </defs>
        </svg>
        {% block body %}{% endblock %}
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>
<script src="/static/js/script.js?v=17"></script>
{% block scripts %}{% endblock %}
</body>
</html>
