<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0A0F"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="iCal"/>
<meta name="description" content="Track calories and macros with AI."/>
<title>{% block title %}iCal{% endblock %}</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>
<link rel="icon" type="image/png" href="/static/icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/style.css?v=11"/>
<link rel="stylesheet" href="/static/css/frame.css?v=11"/>
{% block head %}{% endblock %}
</head>
<body class="frame-body">
<div class="phone-frame-wrap">
  <div class="phone-frame">
    <div class="btn-mute"></div>
    <div class="btn-vol-up"></div>
    <div class="btn-vol-dn"></div>
    <div class="btn-power"></div>
    <div class="screen-glass">
      <div class="dynamic-island">
        <div class="di-sensor"></div>
        <div class="di-lens"></div>
      </div>
      <div id="phone-screen">
        <div id="toast"></div>
        {% block body %}{% endblock %}
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>
<script src="/static/js/script.js?v=11"></script>
{% block scripts %}{% endblock %}
<!-- Service worker disabled: sw.js not implemented -->
</body>
</html>
