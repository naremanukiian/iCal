<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Login — iCal</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div id="toast"></div>
<div class="auth-page">
  <a href="index.html" class="back fu">← Back</a>
  <span class="logo fu" style="font-family:var(--font-d);font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:24px;display:block">iCal</span>
  <h2 class="fu d1" style="margin-bottom:6px">Welcome back</h2>
  <p class="fu d1" style="margin-bottom:28px;font-size:.9rem">Log in to track your meals</p>

  <div class="card card-lg fu d2">
    <div id="err-box" class="alert alert-error hidden" style="margin-bottom:16px"></div>
    <form id="form" style="display:flex;flex-direction:column;gap:16px" novalidate>

      <div class="fg">
        <label class="fl" for="email">Email</label>
        <input id="email" type="email" class="fc" placeholder="you@example.com" autocomplete="email" required/>
        <span id="email-err" class="fe hidden"></span>
      </div>

      <div class="fg">
        <label class="fl" for="password">Password</label>
        <div class="pw-wrap">
          <input id="password" type="password" class="fc" placeholder="Your password" autocomplete="current-password" required/>
          <button type="button" class="pw-eye" id="eye">👁</button>
        </div>
        <span id="pw-err" class="fe hidden"></span>
      </div>

      <div style="text-align:right"><a href="#" style="font-size:.8rem;color:var(--gold);font-weight:600">Forgot password?</a></div>

      <button type="submit" id="btn" class="btn btn-gold btn-full btn-lg">
        <div class="sp"></div><span class="bt">Login</span>
      </button>
    </form>

    <div class="divider" style="margin:20px 0"></div>
    <p style="text-align:center;font-size:.86rem;color:var(--txt2)">
      No account? <a href="register.html" style="color:var(--gold);font-weight:700">Sign up free →</a>
    </p>
  </div>
</div>
<script src="script.js"></script>
<script>
if(localStorage.getItem('token'))window.location.href='dashboard.html';
const form=document.getElementById('form'),emailEl=document.getElementById('email'),pwEl=document.getElementById('password'),btn=document.getElementById('btn'),errBox=document.getElementById('err-box');
document.getElementById('eye').addEventListener('click',()=>{const v=pwEl.type==='text';pwEl.type=v?'password':'text';document.getElementById('eye').textContent=v?'👁':'🙈'});
function showErr(m){errBox.textContent='⚠ '+m;errBox.classList.remove('hidden')}
form.addEventListener('submit',async e=>{
  e.preventDefault();errBox.classList.add('hidden');
  const ok1=markField(emailEl,'email-err',validateEmail(emailEl.value),'Enter a valid email');
  const ok2=markField(pwEl,'pw-err',validateMin(pwEl.value,1),'Password is required');
  if(!ok1||!ok2)return;
  setLoading(btn,true);
  try{
    const data=await api('/login','POST',{email:emailEl.value.trim(),password:pwEl.value});
    localStorage.setItem('token',data.token);
    localStorage.setItem('user_email',data.email);
    localStorage.setItem('user_id',data.user_id);
    localStorage.setItem('username',data.username||data.email.split('@')[0]);
    localStorage.setItem('calorie_goal',data.calorie_goal||2000);
    window.location.href='dashboard.html';
  }catch(err){showErr(err.message);setLoading(btn,false)}
});
</script>
</body>
</html>
