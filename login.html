<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Login — CalorieAI</title>
<link rel="stylesheet" href="style.css"/>
<style>
.auth-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 20px 40px;gap:24px;min-height:100dvh}
.auth-head{text-align:center;padding:0 12px}
.auth-head .ico{font-size:3rem;display:block;margin-bottom:14px}
.auth-head h2{font-size:1.95rem;margin-bottom:8px}
.auth-foot{text-align:center;font-size:.88rem;color:var(--txt2)}
.auth-foot a{color:var(--accent);font-weight:700}
.back{display:flex;align-items:center;gap:6px;font-size:.86rem;color:var(--txt2);font-weight:500;padding:18px 20px 0;width:fit-content;transition:color .15s}
.back:hover{color:var(--accent)}
.form-stack{display:flex;flex-direction:column;gap:16px}
.forgot{text-align:right;font-size:.8rem}
.forgot a{color:var(--accent);font-weight:600}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div id="toast"></div>
<div class="app">

  <a href="index.html" class="back fu">← Back</a>

  <div class="auth-wrap">
    <div class="auth-head fu">
      <span class="ico">👋</span>
      <h2>Welcome back</h2>
      <p>Log in to continue tracking your meals</p>
    </div>

    <div class="card card-lg fu d1">
      <div id="err-box" class="alert alert-error mb16 hidden"></div>

      <form id="login-form" class="form-stack" novalidate>

        <div class="fg">
          <label class="fl" for="email">Email</label>
          <input id="email" type="email" class="fc" placeholder="you@example.com" autocomplete="email" required/>
          <span id="email-err" class="fe hidden"></span>
        </div>

        <div class="fg">
          <label class="fl" for="password">Password</label>
          <div class="pw-wrap">
            <input id="password" type="password" class="fc" placeholder="Your password" autocomplete="current-password" required/>
            <button type="button" class="pw-eye" id="eye-btn" aria-label="Show password">👁</button>
          </div>
          <span id="pw-err" class="fe hidden"></span>
        </div>

        <div class="forgot"><a href="#">Forgot password?</a></div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full btn-lg">
          <div class="sp"></div><span class="bt">Login</span>
        </button>
      </form>

      <div class="divider mt20 mb16">or</div>
      <p class="auth-foot">No account? <a href="register.html">Sign up free →</a></p>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

const form    = document.getElementById('login-form');
const emailEl = document.getElementById('email');
const pwEl    = document.getElementById('password');
const btn     = document.getElementById('login-btn');
const errBox  = document.getElementById('err-box');

// Toggle pw visibility
document.getElementById('eye-btn').addEventListener('click', () => {
  const vis = pwEl.type === 'text';
  pwEl.type = vis ? 'password' : 'text';
  document.getElementById('eye-btn').textContent = vis ? '👁' : '🙈';
});

function showErr(msg) {
  errBox.textContent = '⚠ ' + msg;
  errBox.classList.remove('hidden');
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  errBox.classList.add('hidden');

  const ok1 = markField(emailEl, 'email-err', validateEmail(emailEl.value), 'Enter a valid email');
  const ok2 = markField(pwEl,    'pw-err',    validateMin(pwEl.value, 1),    'Password is required');
  if (!ok1 || !ok2) return;

  setLoading(btn, true);
  try {
    const data = await api('/login', 'POST', {
      email:    emailEl.value.trim(),
      password: pwEl.value,
    });
    localStorage.setItem('token',      data.token);
    localStorage.setItem('user_email', data.email);
    localStorage.setItem('user_id',    data.user_id);
    window.location.href = 'dashboard.html';
  } catch (err) {
    showErr(err.message);
    setLoading(btn, false);
  }
});
</script>
</body>
</html>
