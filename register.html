<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Create Account — iCal</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div id="toast"></div>
<div class="auth-page">
  <a href="index.html" class="back fu">← Back</a>
  <span class="logo fu" style="font-family:var(--font-d);font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:24px;display:block">iCal</span>
  <h2 class="fu d1" style="margin-bottom:6px">Create account</h2>
  <p class="fu d1" style="margin-bottom:28px;font-size:.9rem">Start tracking calories &amp; macros today</p>

  <div class="card card-lg fu d2">
    <div id="err-box" class="alert alert-error hidden" style="margin-bottom:16px"></div>
    <form id="form" style="display:flex;flex-direction:column;gap:16px" novalidate>

      <div class="fg">
        <label class="fl" for="email">Email</label>
        <input id="email" type="email" class="fc" placeholder="you@example.com" autocomplete="email" required/>
        <span id="email-err" class="fe hidden"></span>
      </div>

      <div class="fg">
        <label class="fl" for="password">Password</label>
        <div class="pw-wrap">
          <input id="password" type="password" class="fc" placeholder="Min. 6 characters" autocomplete="new-password" required/>
          <button type="button" class="pw-eye" id="eye">👁</button>
        </div>
        <div class="str-track"><div class="str-bar" id="str-bar"></div></div>
        <span id="pw-err" class="fe hidden"></span>
      </div>

      <div class="fg">
        <label class="fl" for="calgoal">Daily Calorie Goal <span class="opt">(default: 2000)</span></label>
        <input id="calgoal" type="number" class="fc" placeholder="e.g. 2000" min="500" max="5000" value="2000"/>
      </div>

      <div class="fg">
        <label class="fl" for="weight">Weight <span class="opt">(optional, kg)</span></label>
        <input id="weight" type="number" class="fc" placeholder="e.g. 70" min="20" max="400" step="0.1"/>
      </div>

      <div class="fg">
        <label class="fl">Goal <span class="opt">(optional)</span></label>
        <div class="goal-grid">
          <div><input type="radio" name="goal" value="lose"     id="g-l" class="goal-radio"/><label for="g-l" class="goal-lbl"><span class="em">📉</span>Lose weight</label></div>
          <div><input type="radio" name="goal" value="maintain" id="g-m" class="goal-radio"/><label for="g-m" class="goal-lbl"><span class="em">⚖️</span>Maintain</label></div>
          <div><input type="radio" name="goal" value="gain"     id="g-g" class="goal-radio"/><label for="g-g" class="goal-lbl"><span class="em">💪</span>Gain muscle</label></div>
        </div>
      </div>

      <button type="submit" id="btn" class="btn btn-gold btn-full btn-lg">
        <div class="sp"></div><span class="bt">Create Account →</span>
      </button>
      <p style="font-size:.72rem;color:var(--txt3);text-align:center;line-height:1.55">By registering you agree to our Terms of Service and Privacy Policy.</p>
    </form>
    <div class="divider" style="margin:20px 0">already have an account?</div>
    <p style="text-align:center;font-size:.86rem;color:var(--txt2)"><a href="login.html" style="color:var(--gold);font-weight:700">Sign in →</a></p>
  </div>
</div>
<script src="script.js"></script>
<script>
if(localStorage.getItem('token'))window.location.href='dashboard.html';
const form=document.getElementById('form'),emailEl=document.getElementById('email'),pwEl=document.getElementById('password'),btn=document.getElementById('btn'),errBox=document.getElementById('err-box'),strBar=document.getElementById('str-bar');
const SC=['','#f87171','#fb923c','#facc15','#4ade80','#f5c842'];
pwEl.addEventListener('input',()=>{const s=pwStrength(pwEl.value);strBar.style.width=(s*20)+'%';strBar.style.background=SC[s]||'transparent'});
document.getElementById('eye').addEventListener('click',()=>{const v=pwEl.type==='text';pwEl.type=v?'password':'text';document.getElementById('eye').textContent=v?'👁':'🙈'});
function showErr(m){errBox.textContent='⚠ '+m;errBox.classList.remove('hidden')}
form.addEventListener('submit',async e=>{
  e.preventDefault();errBox.classList.add('hidden');
  const ok1=markField(emailEl,'email-err',validateEmail(emailEl.value),'Enter a valid email');
  const ok2=markField(pwEl,'pw-err',validateMin(pwEl.value,6),'Password must be at least 6 characters');
  if(!ok1||!ok2)return;
  const goal=document.querySelector('input[name="goal"]:checked')?.value??null;
  const weight=document.getElementById('weight').value;
  const calgoal=parseInt(document.getElementById('calgoal').value)||2000;
  setLoading(btn,true);
  try{
    const body={email:emailEl.value.trim(),password:pwEl.value,calorie_goal:calgoal};
    if(weight)body.weight=parseFloat(weight);
    if(goal)body.goal=goal;
    const data=await api('/register','POST',body);
    localStorage.setItem('token',data.token);
    localStorage.setItem('user_email',data.email);
    localStorage.setItem('user_id',data.user_id);
    localStorage.setItem('username',data.username||data.email.split('@')[0]);
    localStorage.setItem('calorie_goal',data.calorie_goal||2000);
    window.location.href='dashboard.html';
  }catch(err){showErr(err.message);setLoading(btn,false)}
});
</script>
</body>
</html>
